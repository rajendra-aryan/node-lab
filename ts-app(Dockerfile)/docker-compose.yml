name: e-commerce

services:
  backend:
    # image: raikosword/node-application
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
      
  db:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    # ports:
    #   - "5431:5432"
    # networks:
    #   - frontend
    #   - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data 


  redis:
    image: redis:7-alpine
    container_name: redis
    # ports:
    #   - "6379:6379"
    # networks:
    #   - frontend
    volumes:
      - redis_data:/data


# networks:
#   frontend:
#     driver: bridge
#   backend:
#     driver: bridge


volumes:
  postgres_data:
  redis_data: 

#docker run -it --name -e POSTGRES_PASSWORD=1234 postgres postgres